<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Autoevaluación - Gimnasio Ángeles</title>

<style>

body{
font-family:Arial;
background:#f4f6f8;
text-align:center;
padding:20px;
}

.logo{
width:350px;
}

.container{
background:white;
padding:20px;
border-radius:10px;
width:700px;
margin:auto;
box-shadow:0px 0px 10px rgba(0,0,0,0.1);
}

select,input{
padding:8px;
margin:6px;
width:260px;
}

table{
margin:auto;
border-collapse:collapse;
}

td,th{
border:1px solid #ccc;
padding:8px;
}

th{
background:#1e3a8a;
color:white;
}

button{
padding:10px 20px;
margin:10px;
border:none;
border-radius:5px;
cursor:pointer;
background:#1e3a8a;
color:white;
}

</style>

</head>

<body>

<img src="logo.png" class="logo">

<h2>Autoevaluación Estudiantil</h2>

<div class="container">

<select id="grado" onchange="cargarEstudiantes()">
<option value="">Seleccione grado</option>
<option value="4A">Cuarto A</option>
<option value="6B">Sexto B</option>
<option value="9">Noveno</option>
</select>

<br>

<select id="estudiante"></select>

<br>

<select id="materia">
<option>Matemáticas</option>
<option>Física</option>
<option>Álgebra</option>
<option>Estadística</option>
<option>Biología</option>
<option>Química</option>
<option>Inglés</option>
<option>Informática</option>
<option>Ciencias Políticas</option>
<option>Educación Física</option>
<option>Lengua Castellana</option>
<option>Filosofía</option>
<option>Ciencias Naturales</option>
<option>Ciencias Sociales</option>
</select>

<table id="tabla">
<tr>
<th>Criterio</th>
<th>Nota</th>
</tr>
</table>

<button onclick="guardar()">Guardar</button>

<h3 id="promedio"></h3>

</div>

<script>

/* CREAR CRITERIOS */
let tabla=document.getElementById("tabla")

for(let i=1;i<=10;i++){
let fila=document.createElement("tr")
fila.innerHTML=`
<td>Criterio ${i}</td>
<td><input class="nota"></td>
`
tabla.appendChild(fila)
}

/* LISTAS */
const estudiantes = {

"4A":[
"Alejandra Ossa",
"Alejandro Paz",
"Ana Cuaran"
],

"6B":[
"Juan López",
"Mateo García",
"Samuel Torres"
],

"9":[
"Laura Muñoz",
"Camilo Rojas",
"Daniel Paz"
]

}

/* CARGAR ESTUDIANTES */
function cargarEstudiantes(){

let grado=document.getElementById("grado").value
let lista=estudiantes[grado]

let select=document.getElementById("estudiante")
select.innerHTML=""

if(!lista) return

lista.forEach(e=>{
let option=document.createElement("option")
option.text=e
select.add(option)
})

}

/* CALCULAR PROMEDIO */
function calcularPromedio(){

let notas=[]

document.querySelectorAll(".nota").forEach(n=>{
notas.push(parseFloat(n.value||0))
})

let promedio=notas.reduce((a,b)=>a+b,0)/10

document.getElementById("promedio").innerText="Promedio: "+promedio.toFixed(2)

return promedio
}

/* GUARDAR */
async function guardar(){

let grado=document.getElementById("grado").value
let estudiante=document.getElementById("estudiante").value
let materia=document.getElementById("materia").value

if(!grado || !estudiante){
alert("Seleccione grado y estudiante")
return
}

let notas=[]

document.querySelectorAll(".nota").forEach(n=>{
notas.push(parseFloat(n.value||0))
})

let promedio=calcularPromedio()

let datos={
grado:grado,
estudiante:estudiante,
materia:materia,
notas:notas,
promedio:promedio
}

/* PEGUE SU URL DE GOOGLE SCRIPT AQUI */
let url="https://script.google.com/macros/s/AKfycbxypbjskiUN2NCUlk3rJgKBvur2l-BiuSxZtjvS_UFZYIrzY5PH9OYMNVD6RIOWW7wg/exec"

await fetch(url,{
method:"POST",
body:JSON.stringify(datos)
})

alert("Guardado correctamente")

}

</script>

</body>
</html>
